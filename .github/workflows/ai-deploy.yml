name: AI Deploy

on:
  workflow_dispatch:
    inputs:
      change:
        description: 'What to change on the site (e.g. "make the hero headline bold and blue")'
        required: true
        type: string

jobs:
  ai-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply change with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "${{ inputs.change }}" \
            --allowedTools "Edit,Write,Read" \
            --max-turns 10

      - name: Commit and push
        run: |
          git config user.email "12355670+iyerkm@users.noreply.github.com"
          git config user.name "Assembli AI Deploy"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes made"
          else
            git commit -m "ai: ${{ inputs.change }}"
            git push
            echo "Deployed — live in ~60s at assembli-mauve.vercel.app"
          fi
